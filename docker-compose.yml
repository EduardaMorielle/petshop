# ============================================================
# ARQUIVO: docker-compose.yml
# O QUE É: Orquestrador de containers Docker.
#          Define e conecta os 3 containers da aplicação:
#          banco de dados (db), API (api) e front-end (frontend).
#
# COMO FUNCIONA:
#   "docker-compose up --build" lê este arquivo e:
#     1. Cria a rede interna "petshop_default"
#     2. Sobe o container MySQL (db)
#     3. Aguarda o MySQL ficar saudável (healthcheck)
#     4. Faz o build e sobe o container da API Spring Boot
#     5. Faz o build e sobe o container do front-end Angular/Nginx
#
# COMUNICAÇÃO ENTRE CONTAINERS:
#   Os containers se comunicam pelo nome do serviço como hostname.
#   Por isso o application.properties usa "db" em vez de "localhost":
#     jdbc:mysql://db:3306/petshopdb
#   "db" é resolvido pelo Docker para o IP interno do container MySQL.
#
# PORTAS ESCOLHIDAS:
#   28743 (API) e 24743 (frontend) — portas específicas para evitar
#   conflito com outros alunos no servidor da UEA.
# ============================================================

services:

  # --------------------------------------------------------
  # SERVIÇO: db (MySQL 8)
  # --------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: petshop-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: petshopdb
      MYSQL_USER: petshop
      MYSQL_PASSWORD: petshop123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # SERVIÇO: api (Spring Boot)
  # --------------------------------------------------------
  api:
    build: ./backend
    container_name: petshop-api
    ports:
      - "28743:8743"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/petshopdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Manaus
      SPRING_DATASOURCE_USERNAME: petshop
      SPRING_DATASOURCE_PASSWORD: petshop123
    depends_on:
      db:
        condition: service_healthy

  # --------------------------------------------------------
  # SERVIÇO: frontend (Angular + Nginx)
  # --------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        # API_URL: URL da API que o navegador vai usar para chamar o backend.
        #
        # ⚠️ ATENÇÃO: o Angular "bake" esta URL no JavaScript compilado.
        # Portanto o valor precisa ser o endereço que o NAVEGADOR consegue acessar.
        #
        # LOCALMENTE (sua máquina):
        #   API_URL: http://localhost:28743/api
        #
        # SERVIDOR DA UEA (172.25.1.60):
        #   API_URL: http://172.25.1.60:28743/api
        #
        # Mude apenas esta linha ao trocar de ambiente:
        API_URL: http://localhost:28743/api
    container_name: petshop-frontend
    ports:
      - "24743:4743"
    depends_on:
      - api

volumes:
  db_data:
