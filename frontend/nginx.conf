# ============================================================
# ARQUIVO: nginx.conf
# O QUE É: Configuração do servidor Nginx para servir a SPA Angular.
#
# PROBLEMA QUE RESOLVE:
#   O Angular é uma SPA (Single Page Application). Toda a navegação
#   acontece no lado do cliente via JavaScript. As URLs como
#   /pets, /agendamentos não correspondem a arquivos físicos no servidor.
#
#   Sem esta configuração, se o usuário acessar diretamente
#   http://172.25.1.60:4743/pets ou der F5 em qualquer página,
#   o Nginx retornaria erro 404 (arquivo não encontrado).
#
#   A diretiva "try_files $uri $uri/ /index.html" resolve isso:
#   1. Tenta encontrar o arquivo exato ($uri)
#   2. Tenta encontrar como diretório ($uri/)
#   3. Se não encontrar, serve o index.html (e o Angular assume o controle)
# ============================================================

server {
    # Porta onde o Nginx escuta (mesma do EXPOSE no Dockerfile)
    listen 4743;

    # Pasta onde estão os arquivos compilados do Angular
    root /usr/share/nginx/html;

    # Arquivo padrão a ser servido
    index index.html;

    location / {
        # try_files: tenta servir o arquivo requisitado.
        # Se não existir como arquivo nem diretório, serve o index.html.
        # Isso permite que o Angular Router gerencie as rotas no cliente.
        try_files $uri $uri/ /index.html;
    }
}
