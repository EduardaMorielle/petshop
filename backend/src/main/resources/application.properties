# ============================================================
# ARQUIVO: application.properties
# O QUE É: Arquivo de configuração principal do Spring Boot.
#          Define como a aplicação se comporta em tempo de execução.
#
# COMO FUNCIONA: O Spring lê este arquivo ao iniciar e injeta
# os valores nas classes que usam @Value("${chave}").
#
# ⚠️ ATENÇÃO — DOIS CENÁRIOS DE USO:
#
#   1) Rodando com Docker (docker-compose up):
#      Mantenha "db" como host — é o nome do container MySQL.
#      spring.datasource.url=jdbc:mysql://db:3306/petshopdb?...
#
#   2) Rodando localmente sem Docker (mvn spring-boot:run):
#      Troque "db" por "localhost".
#      spring.datasource.url=jdbc:mysql://localhost:3306/petshopdb?...
#      O MySQL precisa estar rodando localmente na porta 3306
#      com o banco "petshopdb", usuário "petshop" e senha "petshop123".
# ============================================================

# ------------------------------------------------------------
# BANCO DE DADOS — conexão com o MySQL
# ------------------------------------------------------------

# URL de conexão JDBC com o MySQL.
# Formato: jdbc:mysql://<host>:<porta>/<nome_do_banco>?<parametros>
# - "db" é o nome do container MySQL definido no docker-compose.yml
# - Para rodar LOCAL sem Docker: troque "db" por "localhost"
# - useSSL=false: desabilita SSL (desnecessário em ambiente local/dev)
# - allowPublicKeyRetrieval=true: necessário para o MySQL 8 com senhas RSA
# - serverTimezone=America/Manaus: fuso horário correto para o AM
spring.datasource.url=jdbc:mysql://db:3306/petshopdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Manaus

# Usuário do banco criado no docker-compose.yml (MYSQL_USER=petshop)
spring.datasource.username=petshop

# Senha do banco criada no docker-compose.yml (MYSQL_PASSWORD=petshop123)
spring.datasource.password=petshop123

# ------------------------------------------------------------
# JPA / HIBERNATE
# ------------------------------------------------------------

# ddl-auto=update: o Hibernate cria/atualiza as tabelas automaticamente
# com base nas entidades (@Entity). Não apaga dados existentes.
spring.jpa.hibernate.ddl-auto=update

# Dialeto do banco de dados. Informa ao Hibernate como gerar
# SQL compatível com o MySQL 8.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# SERVIDOR
# ------------------------------------------------------------

# Porta onde a API vai escutar.
# ⚠️ Usamos 8743 em vez da padrão 8080 para evitar conflito no servidor da UEA.
# No docker-compose, esta porta é mapeada como 28743:8743 no host.
server.port=8743

# ------------------------------------------------------------
# JWT — JSON Web Token
# ------------------------------------------------------------

# Chave secreta usada para assinar e verificar os tokens JWT.
# ⚠️ Mínimo 256 bits (32 caracteres) para HMAC-SHA256 funcionar.
jwt.secret=petshop-secret-key-256bits-eduarda-2025-cesit-uea

# Tempo de expiração do token em milissegundos.
# 86400000 ms = 24 horas
jwt.expiration=86400000
